name: myapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  camera: ^0.12.0
  image_picker: ^1.2.1
  google_mlkit_face_detection: ^0.13.2
  permission_handler: ^12.0.1
  cached_network_image: ^3.4.1
  go_router: ^17.1.0
  gal: ^2.3.2
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0
  shimmer: ^3.0.0
  shared_preferences: ^2.5.4
  uuid: ^4.5.3
  fl_chart: ^1.1.1
  pdf: ^3.11.3
  printing: ^5.14.2
  path_provider: ^2.1.5
  http: ^1.6.0
  google_maps_flutter: ^2.15.0
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  flutter_cache_manager: ^3.4.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/launcher_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/launcher_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - .env
